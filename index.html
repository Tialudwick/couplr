<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couplr | Astrology & Relationship Sim</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Couplr: Synastry Edition</h1>
        
        <div id="new-agent-form">
            <h3>Add Person to Comparison</h3>
            <div class="input-group">
                <input type="text" id="agent-name" placeholder="Name">
                <input type="date" id="birth-date">
                <input type="time" id="birth-time">
                <button id="add-agent-button">Add to Chart</button>
            </div>
        </div>

        <hr>
        <div id="agents-container"></div>

        <div class="controls">
            <button id="run-sim">Run Relationship Sim</button>
            <button id="calc-astrology" class="secondary-btn">Compare Natal Charts</button>
        </div>

        <div id="results">
            <em>Add two people to see their celestial and behavioral compatibility.</em>
        </div>

        <div class="chart-container">
            <canvas id="simChart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
