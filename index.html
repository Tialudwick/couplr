<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couplr | Neo-Natal Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Couplr</h1>
        <p class="subtitle">NEURAL SYNASTRY PROTOCOL // VER 4.0</p>
        
        <div id="new-agent-form">
            <div class="input-row">
                <input type="text" id="agent-name" placeholder="IDENTIFIER (NAME)">
                <input type="date" id="birth-date">
                <input type="time" id="birth-time">
            </div>
            
            <div class="input-row" style="margin-top: 15px;">
                <div style="position: relative; flex: 2;">
                    <input type="text" id="location-search" placeholder="SEARCH BIRTH CITY (e.g. Tokyo)..." autocomplete="off">
                    <div id="location-results" class="dropdown-results"></div>
                </div>
                <input type="hidden" id="lat">
                <input type="hidden" id="lon">
                <button id="add-agent-button">Scan Birth Map</button>
            </div>
        </div>

        <div id="agents-container"></div>

        <div class="controls">
            <button id="run-sim" class="primary-btn">Initiate Synastry Simulation</button>
            <button id="clear-all" class="ghost-btn">Purge All Data</button>
        </div>

        <div id="results">
            // AWAITING COORDINATES...
        </div>

        <div class="chart-box">
            <canvas id="simChart"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
