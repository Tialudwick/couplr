<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couplr | Relationship Simulator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Couplr</h1>
        <p style="color: #666; margin-bottom: 2rem;">Add two or more people to simulate their relationship trajectory over 12 months.</p>

        <div id="new-agent-form">
            <h3>Add New Person</h3>
            <div class="input-group">
                <input type="text" id="agent-name" placeholder="Name (e.g. Alex)">
                <div class="sliders">
                    <label>Comm: <input type="number" id="agent-comm" min="0" max="1" step="0.01" value="0.5"></label>
                    <label>Trust: <input type="number" id="agent-trust" min="0" max="1" step="0.01" value="0.5"></label>
                    <label>Patience: <input type="number" id="agent-patience" min="0" max="1" step="0.01" value="0.5"></label>
                </div>
                <button id="add-agent-button">Add to Sim</button>
            </div>
        </div>

        <hr>

        <div id="agents-container"></div>

        <div class="controls">
            <button id="run-sim">Run Simulation</button>
            <button id="save-compare" class="secondary-btn">Save for Comparison</button>
        </div>

        <div id="results">
            <em>Add agents and click "Run" to begin.</em>
        </div>

        <div class="chart-container">
            <canvas id="simChart"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
