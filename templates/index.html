<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ app_name }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
<h1>{{ app_name }}</h1>

<!-- User Input Form -->
<div id="new-agent-form">
  <h3>Add New Agent</h3>
  <input type="text" id="agent-name" placeholder="Name">
  <input type="number" id="agent-comm" placeholder="Communication" min="0" max="1" step="0.01" value="0.5">
  <input type="number" id="agent-trust" placeholder="Trust" min="0" max="1" step="0.01" value="0.5">
  <input type="number" id="agent-patience" placeholder="Patience" min="0" max="1" step="0.01" value="0.5">
  <button id="add-agent-button">Add Agent</button>
</div>

<div id="agents-container"></div>

<button id="run-sim">Run Simulation</button>
<button id="load-sim">Load Last Simulation</button>

<div id="results"></div>
<canvas id="simChart"></canvas>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
